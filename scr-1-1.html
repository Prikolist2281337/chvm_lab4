<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=windows-1251">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация в ресторане</title>
    <link rel="stylesheet" href="styles1-1.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script1.js"></script>
</head>
<body>
    <!-- Header -->
    <header>
        <img src="menu_icon.svg" alt="Меню" class="menu-icon">
        <h1>Регистрация</h1>
        <img src="profile_icon.svg" alt="Профиль" class="menu-icon">
    </header>

    <!-- Main Content -->
    <main>
        <label class="restaurant-name">Невские берега</label>

        <p class="pspace">В нашем ресторане самые вкусные обеды по нелорогой цене. Осуществляем достувку на дом.</p>

        <label for="phoneNumber">Телефон:</label>
        <input type="tel" id="phoneNumber" pattern="^\+7\s([0-9]{3})\s[0-9]{3}-[0-9]{2}-[0-9]{2}$" required>


        <button class="continue-btn active">Продолжить</button>

        <p class="pspace">  </p>
        <!-- Social Buttons -->
        <button class="social-btn google-btn"><span>=</span> Регистрация через Google</button>
        <button class="social-btn apple-btn"><span>=</span> Регистрация через Apple</button>

        <p class="pspace">  </p>
        <!-- Agreement Checkbox -->
        <div class="agreement">
            <input type="checkbox" id="agreement-check">
            <label for="agreement-check">Согласие на обработку данных</label>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        Контактная информация
    </footer>
</body>
</html>
