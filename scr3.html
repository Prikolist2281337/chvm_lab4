<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="windows-1251">
    <meta name="viewport" content="width=380">
    <title>Меню ресторана</title>
    <link rel="stylesheet" href="styles3.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="scripts.js"></script>
</head>
<body>
    <!-- Шапка страницы -->
    <header>
        <nav>
            <ul class="menu-categories">
                <li><a href="#" data-category="breakfast">Завтраки</a></li>
                <li><a href="#" data-category="salads">Салаты</a></li>
                <li><a href="#" data-category="soup">Супы</a></li>
                <li><a href="#" data-category="hot-dishes">Горячее</a></li>
                <li><a href="#" data-category="lunch">Обеды</a></li>
                <li><a href="#" data-category="desserts">Десерты</a></li>
                <li><a href="#" data-category="drinks">Напитки</a></li>
            </ul>
        </nav>
    </header>

    <!-- Основное содержимое -->
    <main>
        <section class="dishes-section">
            <div class="dishes-grid">
                <!-- Примеры карточек блюд -->
                <div class="dish-card dish1">Блюдо 1</div>
                <div class="dish-card dish2">Блюдо 2</div>
                <div class="dish-card dish3">Блюдо 3</div>
                <div class="dish-card dish4">Блюдо 4</div>
                <div class="dish-card dish5">Блюдо 5</div>
                <div class="dish-card dish6">Блюдо 6</div>
                <!-- Добавьте больше карточек по необходимости -->
            </div>
        </section>

        <!-- Кнопки внизу -->
        <section class="buttons-section">
            <button class="order-btn">Оформить заказ</button>
        </section>
    </main>

    <!-- Подвал -->
    <footer>
        <p>Контактная информация</p>
    </footer>
</body>
</html>
